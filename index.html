<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sky — Weather</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <!-- Drifting clouds -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <div class="card">
    <div class="header">
      <span class="header-icon">🌤</span>
      <h1>Sky</h1>
      <span>Weather</span>
    </div>

    <div class="search">
      <input id="cityInput" type="text" placeholder="Search city…"/>
      <button onclick="getWeather()">→</button>
    </div>

    <p id="error"></p>

    <div id="loading">
      <div class="spinner"></div>
      Fetching weather…
    </div>

    <div id="weather">
      <!-- Hero -->
      <div class="hero">
        <div class="location">📍 Current Weather</div>
        <div class="city-name" id="cityName"></div>
        <div class="date-line" id="dateTime"></div>
        <div class="temp-row">
          <div class="temp" id="temp"></div>
          <div class="weather-right">
            <span class="weather-icon" id="icon"></span>
            <div class="desc-text" id="desc"></div>
          </div>
        </div>
      </div>

      <!-- Details -->
      <div class="details">
        <div class="detail">
          <span class="detail-emoji">🌡️</span>
          <div>
            <div class="detail-label">Feels Like</div>
            <div class="detail-value" id="feels"></div>
          </div>
        </div>
        <div class="detail">
          <span class="detail-emoji">💧</span>
          <div>
            <div class="detail-label">Humidity</div>
            <div class="detail-value" id="humidity"></div>
          </div>
        </div>
        <div class="detail">
          <span class="detail-emoji">💨</span>
          <div>
            <div class="detail-label">Wind</div>
            <div class="detail-value" id="wind"></div>
          </div>
        </div>
        <div class="detail">
          <span class="detail-emoji">👁️</span>
          <div>
            <div class="detail-label">Visibility</div>
            <div class="detail-value" id="visibility"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
